<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>AniSuss - Design</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 52px;
      min-height: 100vh;
    }

    .canvas {
      display: flex;
      flex-wrap: wrap;
      gap: 56px;
      align-items: flex-start;
    }

    /* Phone */
    .phone-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .screen-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #444;
    }

    .phone {
      width: 375px;
      height: 812px;
      border-radius: 52px;
      border: 1.5px solid #2a2a2a;
      box-shadow: 0 0 0 6px #111, 0 0 0 7.5px #222, 0 48px 120px rgba(0, 0, 0, 0.9);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      background: #000;
    }

    .island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 90px;
      height: 26px;
      background: #000;
      border-radius: 20px;
      z-index: 200;
    }

    .sbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 52px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 28px 8px;
      background: rgba(0,0,0,0.45);
      z-index: 30;
    }

    .sbar-time {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.85);
    }

    .sbar-icons {
      display: flex;
      gap: 5px;
    }

    .sbar-icons span {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
    }

    .screen {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
    }

    .screen::-webkit-scrollbar {
      display: none;
    }

    /* Bottom nav */
    .bnav {
      height: 78px;
      flex-shrink: 0;
      background: rgba(0, 0, 0, 0.97);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: flex-start;
      justify-content: space-around;
      padding-top: 12px;
    }

    .bnav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .nav-ic {
      font-size: 18px;
      opacity: 0.55;
    }

    .nav-ic.on {
      opacity: 1;
      filter: drop-shadow(0 0 7px rgba(255, 100, 10, 0.9));
    }

    .nav-dot {
      width: 4px;
      height: 4px;
      background: #FF640A;
      border-radius: 50%;
      box-shadow: 0 0 6px #FF640A;
    }

    .nav-lbl {
      font-size: 9px;
      color: rgba(255, 255, 255, 0.5);
    }

    .bnav-item.on .nav-lbl {
      color: #FF640A;
      font-weight: 700;
    }

    /* Glass */
    .glass {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 16px;
    }

    /* Buttons */
    .btn-red {
      background: #FF640A;
      border-radius: 14px;
      padding: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 28px rgba(255, 100, 10, 0.38);
    }

    .btn-ghost {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Tags */
    .tag {
      font-size: 9px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 100px;
      white-space: nowrap;
    }

    .tag-red {
      background: rgba(255, 100, 10, 0.14);
      border: 1px solid rgba(255, 100, 10, 0.28);
      color: #FF640A;
    }

    .tag-grey {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.45);
    }

    /* Utilities */
    .hscroll {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 0 16px 4px;
      scrollbar-width: none;
    }

    .hscroll::-webkit-scrollbar {
      display: none;
    }

    .sec-hdr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 16px 11px;
    }

    .sec-ttl {
      font-size: 15px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.01em;
    }

    .see-all {
      font-size: 10px;
      color: #FF640A;
      font-weight: 600;
    }

    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.05);
      margin: 0 16px;
    }

    .ambient {
      position: absolute;
      pointer-events: none;
      border-radius: 50%;
      filter: blur(70px);
      background: rgba(255, 100, 10, 0.18);
      width: 260px;
      height: 260px;
    }

    .cover {
      object-fit: cover;
      display: block;
    }

    .skel {
      background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0
      }

      100% {
        background-position: -200% 0
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const QUERY = `{
  trending: Page(page:1, perPage:15){
    media(type:ANIME, sort:TRENDING_DESC, isAdult:false){
      id title{ romaji english }
      coverImage{ large } bannerImage
      episodes averageScore genres status
    }
  }
  top: Page(page:1, perPage:10){
    media(type:ANIME, sort:SCORE_DESC, isAdult:false){
      id title{ romaji english }
      coverImage{ large extraLarge }
      bannerImage
      episodes averageScore genres
    }
  }
}`;

    function animeTitle(a) { return (a.title.english || a.title.romaji || "").slice(0, 28) || "Unknown"; }
    function animeScore(a) { return a.averageScore ? (a.averageScore / 10).toFixed(1) : "N/A"; }
    function animeEps(a) { return a.episodes ? `${a.episodes} eps` : "Ongoing"; }
    function animeGenre(a) { return (a.genres || []).slice(0, 2).join(" · "); }

    const NAV_ITEMS = [
      { icon: "🏠", label: "Home" }, { icon: "🔭", label: "Discover" },
      { icon: "💬", label: "Chat" }, { icon: "📋", label: "Lists" }, { icon: "👤", label: "Profile" }
    ];

    function Phone({ label, tab = 0, noNav = false, children }) {
      return (
        <div className="phone-col">
          <div className="screen-label">{label}</div>
          <div className="phone">
            <div className="island" />
            <div className="sbar">
              <span className="sbar-time">9:41</span>
              <div className="sbar-icons"><span>▲▲▲</span><span>WiFi</span><span>▮▮▮</span></div>
            </div>
            <div className="screen">{children}</div>
            {!noNav && (
              <div className="bnav">
                {NAV_ITEMS.map((n, i) => (
                  <div key={i} className={`bnav-item ${i === tab ? "on" : ""}`}>
                    <span className={`nav-ic ${i === tab ? "on" : ""}`}>{n.icon}</span>
                    {i === tab ? <div className="nav-dot" /> : <span className="nav-lbl">{n.label}</span>}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    function StickyNav({ children }) {
      return (
        <div style={{
          position: "sticky", top: 0, zIndex: 50,
          background: "rgba(0,0,0,0.88)",
          backdropFilter: "blur(24px)", WebkitBackdropFilter: "blur(24px)",
          borderBottom: "1px solid rgba(255,255,255,0.05)",
          paddingTop: 52
        }}>{children}</div>
      );
    }

    /* ════════════════════════════════════
       SCREEN 1 — HOME / FEED
    ════════════════════════════════════ */
    const MOODS = ["All", "Hype", "Cozy", "Sad", "Dark", "Romance", "Funny", "Action"];
    const PROG = [65, 32, 88];

    function HomeScreen({ trending, top }) {
      const [mood, setMood] = useState("All");
      const continueList = trending.slice(0, 3);
      const forYou = top.slice(0, 3);
      const trendCards = trending.slice(3, 7);

      return (
        <div style={{ background: "#000", minHeight: "100%", position: "relative", overflow: "hidden" }}>
          <div className="ambient" style={{ top: -80, right: -80, opacity: 0.85 }} />

          {/* Top Nav */}
          <StickyNav>
            <div style={{ padding: "10px 16px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ width: 30, height: 30, background: "#FF640A", borderRadius: 9, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 0 16px rgba(255,100,10,0.45)" }}>
                  <span style={{ fontSize: 13, fontWeight: 900, color: "#fff" }}>A</span>
                </div>
                <span style={{ fontSize: 16, fontWeight: 800, color: "#fff", letterSpacing: "-0.02em" }}>AniSuss</span>
              </div>
              <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                {["🔍", "🔔"].map((ic, i) => (
                  <div key={i} style={{ width: 34, height: 34, background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 50, display: "flex", alignItems: "center", justifyContent: "center", position: "relative" }}>
                    <span style={{ fontSize: 13 }}>{ic}</span>
                    {i === 1 && <div style={{ position: "absolute", top: 5, right: 5, width: 7, height: 7, background: "#FF640A", borderRadius: "50%", border: "1.5px solid #000", boxShadow: "0 0 6px #FF640A" }} />}
                  </div>
                ))}
                <div style={{ width: 34, height: 34, borderRadius: 50, background: "rgba(255,100,10,0.15)", border: "1.5px solid rgba(255,100,10,0.35)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <span style={{ fontSize: 12, fontWeight: 700, color: "#FF640A" }}>S</span>
                </div>
              </div>
            </div>
          </StickyNav>

          {/* Greeting */}
          <div style={{ padding: "20px 16px 10px" }}>
            <p style={{ fontSize: 12, color: "rgba(255,255,255,0.35)", marginBottom: 5 }}>Good evening</p>
            <p style={{ fontSize: 23, fontWeight: 800, color: "#fff", letterSpacing: "-0.03em", lineHeight: 1.15 }}>
              What are you<br />watching tonight?
            </p>
          </div>

          {/* Streak */}
          <div style={{ padding: "0 16px 14px" }}>
            <div style={{ display: "inline-flex", gap: 7, alignItems: "center", padding: "6px 13px", borderRadius: 100, background: "rgba(255,100,10,0.1)", border: "1px solid rgba(255,100,10,0.22)" }}>
              <span style={{ fontSize: 12 }}>🔥</span>
              <span style={{ fontSize: 11, fontWeight: 700, color: "rgba(255,100,10,0.9)" }}>7-day streak</span>
            </div>
          </div>

          {/* Mood pills */}
          <div className="hscroll" style={{ gap: 7, paddingBottom: 18 }}>
            {MOODS.map(m => (
              <div key={m} onClick={() => setMood(m)} style={{
                flexShrink: 0, padding: "7px 15px", borderRadius: 100, cursor: "pointer",
                background: mood === m ? "#FF640A" : "rgba(255,255,255,0.05)",
                border: mood === m ? "none" : "1px solid rgba(255,255,255,0.08)",
                boxShadow: mood === m ? "0 0 18px rgba(255,100,10,0.3)" : "none",
                transition: "all 0.18s"
              }}>
                <span style={{ fontSize: 11, fontWeight: 600, color: mood === m ? "#fff" : "rgba(255,255,255,0.4)" }}>{m}</span>
              </div>
            ))}
          </div>
          <div className="divider" />

          {/* Continue Watching */}
          <div className="sec-hdr"><span className="sec-ttl">Continue Watching</span><span className="see-all">See all</span></div>
          <div className="hscroll">
            {continueList.map((a, i) => (
              <div key={a.id} style={{ width: 134, flexShrink: 0, borderRadius: 14, overflow: "hidden", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.07)" }}>
                <div style={{ height: 82, position: "relative", overflow: "hidden" }}>
                  <img src={a.coverImage.large} alt={animeTitle(a)} className="cover" style={{ width: "100%", height: "100%" }} />
                  <div style={{ position: "absolute", inset: 0, background: "linear-gradient(transparent 40%,rgba(0,0,0,0.7))" }} />
                  <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", width: 26, height: 26, background: "rgba(255,100,10,0.85)", backdropFilter: "blur(4px)", borderRadius: 50, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 0 12px rgba(255,100,10,0.5)" }}>
                    <span style={{ fontSize: 9, color: "#fff", marginLeft: 2 }}>▶</span>
                  </div>
                  <div style={{ position: "absolute", bottom: 5, left: 7 }}>
                    <span style={{ display: "inline-flex", alignItems: "center", fontSize: 8, fontWeight: 700, color: "rgba(255,255,255,0.85)", background: "rgba(0,0,0,0.6)", padding: "2px 6px", borderRadius: 5 }}>Ep {i + 3}</span>
                  </div>
                </div>
                <div style={{ padding: "8px 10px 10px" }}>
                  <p style={{ fontSize: 10, fontWeight: 700, color: "rgba(255,255,255,0.85)", marginBottom: 4, overflow: "hidden", whiteSpace: "nowrap", textOverflow: "ellipsis" }}>{animeTitle(a)}</p>
                  <p style={{ fontSize: 9, color: "rgba(255,255,255,0.65)", marginBottom: 8 }}>{animeEps(a)}</p>
                  <div style={{ height: 2, background: "rgba(255,255,255,0.08)", borderRadius: 2 }}>
                    <div style={{ height: "100%", width: `${PROG[i]}%`, background: "#FF640A", borderRadius: 2, boxShadow: "0 0 6px rgba(255,100,10,0.5)" }} />
                  </div>
                </div>
              </div>
            ))}
          </div>

          <div className="divider" style={{ marginTop: 14 }} />

          {/* For You */}
          <div className="sec-hdr"><span className="sec-ttl">✦ For You</span><span className="see-all">See all</span></div>
          <div style={{ padding: "0 16px", display: "flex", flexDirection: "column", gap: 8 }}>
            {forYou.map((a, i) => (
              <div key={a.id} style={{ display: "flex", gap: 12, background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 16, padding: "10px", alignItems: "center" }}>
                <div style={{ width: 54, height: 78, borderRadius: 10, flexShrink: 0, overflow: "hidden" }}>
                  <img src={a.coverImage.large} alt={animeTitle(a)} className="cover" style={{ width: "100%", height: "100%" }} />
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <p style={{ fontSize: 12, fontWeight: 700, color: "#fff", marginBottom: 4, overflow: "hidden", whiteSpace: "nowrap", textOverflow: "ellipsis" }}>{animeTitle(a)}</p>
                  <p style={{ fontSize: 9, color: "rgba(255,255,255,0.65)", marginBottom: 8 }}>{animeGenre(a)}</p>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <span className="tag tag-red" style={{ fontWeight: 800, fontSize: 9 }}>{94 - i * 3}% match</span>
                    <span style={{ fontSize: 9, color: "rgba(255,255,255,0.65)" }}>{animeEps(a)}</span>
                  </div>
                </div>
                <div style={{ width: 24, height: 28, border: "1px solid rgba(255,255,255,0.09)", borderRadius: 7, display: "flex", alignItems: "center", justifyContent: "center", alignSelf: "flex-start", flexShrink: 0 }}>
                  <span style={{ fontSize: 11, color: "rgba(255,255,255,0.2)" }}>+</span>
                </div>
              </div>
            ))}
          </div>

          {/* Trending */}
          <div className="sec-hdr" style={{ paddingTop: 22 }}><span className="sec-ttl">Trending Now</span><span className="see-all">See all</span></div>
          <div className="hscroll" style={{ paddingBottom: 16 }}>
            {trendCards.map((a, i) => (
              <div key={a.id} style={{ width: 108, flexShrink: 0 }}>
                <div style={{ height: 154, borderRadius: 14, overflow: "hidden", position: "relative" }}>
                  <img src={a.coverImage.large} alt={animeTitle(a)} className="cover" style={{ width: "100%", height: "100%" }} />
                  <div style={{ position: "absolute", inset: 0, background: "linear-gradient(transparent 55%,rgba(0,0,0,0.75))" }} />
                  <div style={{ position: "absolute", top: 7, left: 7, background: "rgba(0,0,0,0.6)", backdropFilter: "blur(6px)", borderRadius: 7, padding: "2px 7px", border: "1px solid rgba(255,255,255,0.08)" }}>
                    <span style={{ fontSize: 9, fontWeight: 800, color: "#FF640A" }}>#{i + 1}</span>
                  </div>
                </div>
                <div style={{ paddingTop: 7 }}>
                  <p style={{ fontSize: 10, fontWeight: 600, color: "rgba(255,255,255,0.75)", overflow: "hidden", whiteSpace: "nowrap", textOverflow: "ellipsis", marginBottom: 3 }}>{animeTitle(a)}</p>
                  <p style={{ fontSize: 9, color: "rgba(255,255,255,0.65)" }}>{animeGenre(a)}</p>
                </div>
              </div>
            ))}
          </div>

          {/* Find Similar */}
          <div style={{ padding: "6px 16px 28px" }}>
            <div style={{ background: "rgba(255,100,10,0.07)", border: "1px solid rgba(255,100,10,0.18)", borderRadius: 18, padding: "16px" }}>
              <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 12 }}>
                <div style={{ width: 32, height: 32, background: "rgba(255,100,10,0.15)", border: "1px solid rgba(255,100,10,0.3)", borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <span style={{ fontSize: 14, color: "#FF640A" }}>✦</span>
                </div>
                <div>
                  <p style={{ fontSize: 12, fontWeight: 700, color: "#fff" }}>Find Anime Like This</p>
                  <p style={{ fontSize: 9, color: "rgba(255,255,255,0.3)" }}>AI-powered similarity search</p>
                </div>
              </div>
              <div style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 11, padding: "10px 14px", display: "flex", gap: 8, alignItems: "center" }}>
                <span style={{ fontSize: 11, color: "rgba(255,255,255,0.2)" }}>🔍</span>
                <span style={{ fontSize: 11, color: "rgba(255,255,255,0.2)" }}>e.g. "Attack on Titan"</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════
       SCREEN 2 — DISCOVER
    ════════════════════════════════════ */
    const GENRE_LIST = [
      { label: "Action", icon: "⚔️" }, { label: "Romance", icon: "🌸" },
      { label: "Dark", icon: "🖤" }, { label: "Comedy", icon: "😂" },
      { label: "Isekai", icon: "🌀" }, { label: "Horror", icon: "💀" },
      { label: "Mecha", icon: "🤖" }, { label: "Sports", icon: "⚽" },
    ];

    function DiscoverScreen({ trending, top }) {
      const [tab, setTab] = useState("Genres");
      const TABS = ["Genres", "Seasonal", "Top Rated", "New"];
      const topGrid = top.slice(0, 6);

      return (
        <div style={{ background: "#000", minHeight: "100%", position: "relative", overflow: "hidden" }}>
          <div className="ambient" style={{ top: -60, left: -60, opacity: 0.7 }} />

          <StickyNav>
            <div style={{ padding: "12px 16px 0" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <span style={{ fontSize: 20, fontWeight: 800, color: "#fff", letterSpacing: "-0.02em" }}>Discover</span>
                <div style={{ width: 36, height: 36, background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 50, display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <span style={{ fontSize: 15 }}>🔍</span>
                </div>
              </div>
              <div style={{ display: "flex" }}>
                {TABS.map(t => (
                  <div key={t} onClick={() => setTab(t)} style={{ flex: 1, textAlign: "center", padding: "8px 0", fontSize: 10, fontWeight: 600, cursor: "pointer", color: tab === t ? "#FF640A" : "rgba(255,255,255,0.3)", borderBottom: tab === t ? "2px solid #FF640A" : "2px solid transparent" }}>{t}</div>
                ))}
              </div>
            </div>
          </StickyNav>

          {/* Search */}
          <div style={{ padding: "14px 16px" }}>
            <div style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 14, padding: "12px 16px", display: "flex", gap: 10, alignItems: "center" }}>
              <span style={{ fontSize: 13, color: "rgba(255,255,255,0.2)" }}>🔍</span>
              <span style={{ fontSize: 11, color: "rgba(255,255,255,0.2)" }}>Search anime, genres, studios...</span>
            </div>
          </div>

          {/* Genre chips */}
          <div style={{ padding: "0 16px 18px" }}>
            <p style={{ fontSize: 10, fontWeight: 700, color: "rgba(255,255,255,0.25)", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 12 }}>Browse by Genre</p>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {GENRE_LIST.map((g, i) => (
                <div key={g.label} style={{
                  display: "flex", alignItems: "center", gap: 6,

            {["demon slayer season 4", "demon lord anime", "best demon anime"].map((q, i) => (
              <div key={i} style={{ display: "flex", gap: 10, alignItems: "center", padding: "10px 0", borderBottom: i < 2 ? "1px solid rgba(255,255,255,0.05)" : "none" }}>
                <span style={{ fontSize: 12, color: "rgba(255,255,255,0.18)" }}>🔍</span>
                <span style={{ fontSize: 11, color: "rgba(255,255,255,0.42)" }}>{q}</span>
              </div>
            ))}
            <div style={{ height: 16 }} />
          </div>
        </div>
      );
    }

    function App() {
      const [data, setData] = useState(null);
      const [err, setErr] = useState(null);

      useEffect(() => {
        fetch("https://graphql.anilist.co", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Accept": "application/json" },
          body: JSON.stringify({ query: QUERY })
        })
          .then(r => r.json())
          .then(d => setData(d.data))
          .catch(e => setErr(e.message));
      }, []);

      if (err) return <div style={{ color: "#FF640A", padding: 40, fontFamily: "sans-serif" }}>Error: {err}</div>;
      if (!data) return (
        <div style={{ color: "rgba(255,255,255,0.3)", fontSize: 13, padding: "60px", textAlign: "center", width: "100%", fontFamily: "sans-serif" }}>
          <div style={{ fontSize: 28, marginBottom: 12 }}>⏳</div>
          Fetching live anime data from AniList...
        </div>
      );

      const tList = data.trending.media;
      const tTop = data.top.media;

      return (
        <div className="canvas">
          <Phone label="01 — Home / Feed" tab={0}><HomeScreen trending={tList} top={tTop} /></Phone>
          <Phone label="02 — Discover" tab={1}><DiscoverScreen trending={tList} top={tTop} /></Phone>
          <Phone label="03 — Anime Detail" tab={1}><DetailScreen trending={tList} top={tTop} /></Phone>
          <Phone label="04 — Mood Picker" tab={0}><MoodScreen trending={tList} /></Phone>
          <Phone label="05 — Chat" tab={2}><ChatScreen /></Phone>
          <Phone label="06 — Profile" tab={4}><ProfileScreen trending={tList} top={tTop} /></Phone>
          <Phone label="07 — Sign In" noNav><AuthScreen /></Phone>
          <Phone label="08 — Onboarding" noNav><OnboardingScreen /></Phone>
          <Phone label="09 — Find Similar" tab={1}><FindSimilarScreen trending={tList} /></Phone>
          <Phone label="10 — Watchlists" tab={3}><WatchlistsScreen trending={tList} /></Phone>
          <Phone label="11 — Watchlist Detail" tab={3}><WatchlistDetailScreen trending={tList} /></Phone>
          <Phone label="12 — Notifications" tab={0}><NotificationsScreen /></Phone>
          <Phone label="13 — Search Results" tab={1}><SearchScreen trending={tList} /></Phone>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
